<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Sales Hiring Event</title>
  <meta name="description" content="Thank you for your application to the Sales Hiring Event. We'll be in touch soon." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--color-bg-secondary);
    }

    .thankyou-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .thankyou-bg .glow-1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--color-accent-blue) 0%, transparent 70%);
      opacity: 0.12;
      animation: pulseGlow 6s ease-in-out infinite;
    }

    .thankyou-bg .glow-2 {
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--color-cta) 0%, transparent 70%);
      opacity: 0.08;
    }

    .thankyou-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
      animation: fadeInUp 0.8s ease forwards;
    }

    .checkmark-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-cta) 0%, var(--color-cta-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
      opacity: 0;
      transform: scale(0);
      box-shadow: 0 10px 40px rgba(237, 103, 10, 0.3);
    }

    @keyframes scaleIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .checkmark-circle svg {
      width: 50px;
      height: 50px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCheck 0.6s ease 0.7s forwards;
    }

    @keyframes drawCheck {
      to {
        stroke-dashoffset: 0;
      }
    }

    .thankyou-title {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 6vw, 4rem);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--color-cta) 0%, var(--color-cta-hover) 50%, var(--color-text-white) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .thankyou-message {
      font-size: 1.15rem;
      color: var(--color-text-muted);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .thankyou-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .thankyou-redirect {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      opacity: 0.7;
    }

    .thankyou-redirect span {
      color: var(--color-cta);
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="thankyou-page">
    <!-- Background Effects -->
    <div class="thankyou-bg">
      <div class="glow-1"></div>
      <div class="glow-2"></div>
    </div>

    <!-- Content -->
    <div class="thankyou-content">
      <div class="checkmark-circle">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 12 10 16 18 8" />
        </svg>
      </div>

      <h1 class="thankyou-title">Thank You!</h1>

      <p class="thankyou-message">
        Your application has been submitted successfully. Our team will review your
        details and get back to you shortly. Keep an eye on your inbox!
      </p>

      <div class="thankyou-actions">
        <a href="index.html" class="btn-primary">
          Back to Home
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <a href="index.html#about" class="btn-outline">Learn More About Us</a>
      </div>

      <p class="thankyou-redirect">
        Redirecting to home in <span id="redirect-countdown">10</span> seconds...
      </p>
    </div>
  </div>

  <script>
    // Auto-redirect countdown
    let seconds = 10;
    const countdownEl = document.getElementById('redirect-countdown');

    const interval = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>

</html>
